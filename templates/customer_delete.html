{% extends "base.html" %}

{% block title %}
Delete Customer
{% endblock %}

{% block content %}

<div class="page-header">

    <div>

        <h1>Delete Customer</h1>

        <p class="text-muted">
            Please confirm you want to delete this customer.
        </p>

    </div>

</div>

<div class="card border-danger shadow-sm">

    <div class="card-body">

        <div class="alert alert-danger">

            <h5 class="alert-heading">
                Warning
            </h5>

            <p class="mb-0">
                This action cannot be undone.
            </p>

        </div>

        <dl class="row">

            <dt class="col-sm-3">
                Account
            </dt>

            <dd class="col-sm-9">
                {{ customer.account }}
            </dd>

            <dt class="col-sm-3">
                Name
            </dt>

            <dd class="col-sm-9">
                {{ customer.name }}
            </dd>

        </dl>

        <form method="POST">

            <button
                type="submit"
                class="btn btn-danger"
            >
                Delete Customer
            </button>

            <a
                href="{{ url_for('list_customers') }}"
                class="btn btn-outline-secondary"
            >
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
