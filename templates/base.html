<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>
        {% block title %}Customer Manager{% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >
</head>

<body>
    <div class="app-layout">

        <aside class="sidebar">
            <div class="sidebar-title">
                Customer Manager
            </div>

            <nav class="nav flex-column">

    <a class="nav-link {% if current_page == 'dashboard' %}active{% endif %}" href="/">
        🏠 Dashboard
    </a>

    <a class="nav-link {% if current_page == 'customers' %}active{% endif %}" href="/customers">
        👥 Customers
    </a>

    <a class="nav-link disabled" href="#">
        🤖 AI Assistant
    </a>

    <a class="nav-link disabled" href="#">
        ⚙ Settings
    </a>

</nav>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>

    </div>
</body>
</html>
