{% extends "base.html" %}

{% block title %}
Customer Details
{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Customer Details</h1>
        <p class="text-muted">
            View the selected customer account.
        </p>
    </div>

    <a
        href="{{ url_for('list_customers') }}"
        class="btn btn-outline-secondary"
    >
        Back to Customers
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">

        <dl class="row mb-0">

            <dt class="col-sm-3">Customer ID</dt>
            <dd class="col-sm-9">{{ customer[0] }}</dd>

            <dt class="col-sm-3">Customer Name</dt>
            <dd class="col-sm-9">{{ customer[1] }}</dd>

            <dt class="col-sm-3">Account</dt>
            <dd class="col-sm-9">{{ customer[2] }}</dd>

        </dl>

    </div>
</div>

{% endblock %}
